<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0fdf4; font-family: sans-serif; overflow-x: hidden; }
    .header { background: #15803d; color: white; padding: 20px 0; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #reader { border-radius: 20px; overflow: hidden; border: 4px solid white !important; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .status-area { min-height: 90px; transition: 0.2s; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }
    .bg-ready { background: white; color: #666; border: 1px solid #ddd; }
    .bg-scan-ok { background: #22c55e !important; color: white !important; transform: scale(1.05); }
    .nav-pills .nav-link.active { background-color: #15803d; }
  </style>
</head>
<body>

<div class="header text-center mb-4">
  <h4 class="fw-bold mb-0">🕌 ABSENSI DZUHUR KILAT</h4>
  <small>Masjid SMK - Tempel Langsung Jalan</small>
</div>

<div class="container" style="max-width: 450px;">
  <ul class="nav nav-pills mb-3 justify-content-center p-1 bg-white rounded-pill shadow-sm">
    <li class="nav-item flex-fill"><button class="nav-link w-100 active" data-bs-toggle="pill" data-bs-target="#tab-scan">📸 SCAN</button></li>
    <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab-dash">📊 DATA</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-scan">
      <div id="reader"></div>
      <div id="statusBox" class="status-area bg-ready mt-4 shadow-sm">
         SIAP PINDAI...
      </div>
    </div>

    <div class="tab-pane fade" id="tab-dash">
      <div class="card border-0 shadow-sm p-4 rounded-4 text-center">
        <input type="text" id="idIn" class="form-control mb-2" placeholder="Masukkan ID Siswa...">
        <button class="btn btn-success w-100 mb-3" onclick="cekData()">Cek Kehadiran</button>
        <div id="resDash" style="display:none;">
           <h5 id="namaS"></h5>
           <h1 id="hadirS" class="display-3 fw-bold text-success">0</h1>
           <p class="text-muted">Total Kehadiran</p>
        </div>
      </div>
    </div>
  </div>
</div>

<audio id="beep" src="https://www.soundjay.com/buttons/beep-07.wav" preload="auto"></audio>

<script>
  let scanner;
  let processing = false;

  function onScanSuccess(decodedText) {
    if (processing) return;
    processing = true;

    // 1. RESPON INSTAN (Visual & Audio)
    const box = document.getElementById('statusBox');
    const beep = document.getElementById('beep');
    
    box.innerText = "BERHASIL: " + decodedText;
    box.className = "status-area bg-scan-ok mt-4 shadow-sm";
    try { beep.play(); } catch(e) {}

    // 2. KIRIM DATA KE GOOGLE (Tanpa Menunggu Jawaban)
    google.script.run.prosesAbsen(decodedText);

    // 3. RESET SCANNER (Dalam 0.7 Detik)
    setTimeout(() => {
      box.innerText = "SIAP PINDAI...";
      box.className = "status-area bg-ready mt-4 shadow-sm";
      processing = false;
    }, 700);
  }

  function start() {
    scanner = new Html5QrcodeScanner("reader", { 
      fps: 30, // Sangat cepat
      qrbox: {width: 250, height: 250},
      aspectRatio: 1.0,
      showTorchButtonIfSupported: true 
    });
    scanner.render(onScanSuccess);
  }

  function cekData() {
    const id = document.getElementById('idIn').value;
    google.script.run.withSuccessHandler(d => {
      if(d){
        document.getElementById('resDash').style.display = 'block';
        document.getElementById('namaS').innerText = d.nama;
        document.getElementById('hadirS').innerText = d.hadir;
      } else { alert("Data tidak ada"); }
    }).getStatsSiswa(id);
  }

  window.onload = start;
</script>
</body>
</html>
