<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0fdf4; font-family: sans-serif; }
    .header { background: #15803d; color: white; padding: 15px 0; border-radius: 0 0 20px 20px; }
    #reader { border-radius: 15px; overflow: hidden; border: 2px solid #15803d !important; }
    .status-area { min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 10px; }
    .nav-pills .nav-link.active { background-color: #15803d; }
  </style>
</head>
<body>

<div class="header text-center mb-3">
  <h5 class="fw-bold mb-0 text-uppercase">🕌 Absensi Dzuhur Masjid</h5>
</div>

<div class="container" style="max-width: 450px;">
  <ul class="nav nav-pills mb-3 justify-content-center p-1 bg-white rounded-pill shadow-sm">
    <li class="nav-item flex-fill">
      <button class="nav-link w-100 active" data-bs-toggle="pill" data-bs-target="#tab-scan">📸 SCAN</button>
    </li>
    <li class="nav-item flex-fill">
      <button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab-dash">📊 DATA</button>
    </li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-scan">
      <div id="reader"></div>
      <div id="statusBox" class="status-area bg-white border mt-3 text-muted shadow-sm">
         SIAP PINDAI...
      </div>
    </div>

    <div class="tab-pane fade" id="tab-dash">
      <div class="card border-0 shadow-sm p-4 rounded-4 text-center">
        <div class="mb-3">
          <input type="text" id="idInputan" class="form-control" placeholder="Masukkan ID Siswa...">
        </div>
        <button class="btn btn-success w-100 mb-3" onclick="ambilDataSiswa()">Tampilkan Progres</button>
        
        <div id="hasilDash" class="p-3 border rounded-3" style="display:none;">
           <h6 id="namaSiswaTxt" class="fw-bold text-dark"></h6>
           <hr>
           <p class="mb-0 text-muted">Total Hadir Dzuhur:</p>
           <h1 id="hadirSiswaTxt" class="display-3 fw-bold text-success">0</h1>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let scanner;
  let sedangProses = false;

  // FUNGSI SCAN
  function onScanSuccess(decodedText) {
    if (sedangProses) return;
    sedangProses = true;

    const box = document.getElementById('statusBox');
    box.innerText = "MENGIRIM: " + decodedText;
    box.className = "status-area bg-warning text-dark mt-3 shadow-sm";

    google.script.run.withSuccessHandler(res => {
      if(res.status === 'success') {
        box.innerText = "BERHASIL: " + decodedText;
        box.className = "status-area bg-success text-white mt-3 shadow-sm";
      } else {
        box.innerText = "GAGAL: " + res.pesan;
        box.className = "status-area bg-danger text-white mt-3 shadow-sm";
      }
      
      setTimeout(() => {
        box.innerText = "SIAP PINDAI...";
        box.className = "status-area bg-white border mt-3 text-muted shadow-sm";
        sedangProses = false;
      }, 1500);
    }).prosesAbsen(decodedText);
  }

  // FUNGSI TOMBOL DASHBOARD (Sudah Diperbaiki)
  function ambilDataSiswa() {
    const id = document.getElementById('idInputan').value;
    const hasil = document.getElementById('hasilDash');
    
    if(!id) { alert("Isi ID dulu!"); return; }

    google.script.run.withSuccessHandler(d => {
      if(d) {
        hasil.style.display = 'block';
        document.getElementById('namaSiswaTxt').innerText = "Halo, " + d.nama;
        document.getElementById('hadirSiswaTxt').innerText = d.hadir;
      } else {
        alert("ID Siswa tidak ditemukan atau belum pernah absen.");
        hasil.style.display = 'none';
      }
    }).getStatsSiswa(id);
  }

  window.onload = function() {
    scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
