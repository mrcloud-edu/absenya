<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presensi Dzuhur Masjid SMK</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root { --hijau-masjid: #15803d; }
    body { background-color: #f0fdf4; font-family: 'Poppins', sans-serif; color: #333; }
    
    .header { 
      background: var(--hijau-masjid); 
      color: white; 
      padding: 30px 15px; 
      border-radius: 0 0 35px 35px; 
      box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
    }

    .main-container { max-width: 480px; margin: -30px auto 50px; padding: 0 15px; }

    #reader { 
      border-radius: 25px; 
      overflow: hidden; 
      border: 6px solid white !important; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
      background: white;
    }

    .status-area { 
      min-height: 100px; 
      display: flex; 
      flex-direction: column;
      align-items: center; 
      justify-content: center; 
      font-weight: 600; 
      border-radius: 20px; 
      margin-top: 25px; 
      text-align: center; 
      padding: 15px;
      transition: all 0.3s ease;
      background: white;
      border: 2px dashed #cbd5e1;
    }

    .bg-success-custom { background: #22c55e !important; color: white !important; border: none; }
    .bg-error-custom { background: #ef4444 !important; color: white !important; border: none; }
    .bg-waiting { background: #fbbf24 !important; color: #451a03 !important; border: none; }

    .footer { font-size: 0.8rem; color: #64748b; margin-top: 30px; }
  </style>
</head>
<body>

<div class="header text-center">
  <h3 class="fw-bold mb-1">🕌 PRESENSI DZUHUR</h3>
  <p class="mb-0 opacity-75">Masjid Sekolah SMK Unggul</p>
</div>

<div class="main-container">
  <div id="reader"></div>

  <div id="statusBox" class="status-area shadow-sm">
    <div id="statusIcon" class="fs-4 mb-1">📸</div>
    <div id="statusText">SIAP MEMINDAI...</div>
  </div>

  <div class="footer text-center">
    <p>© 2026 Sistem Absensi Digital SMK</p>
  </div>
</div>

<script>
  /**
   * PENTING: GANTI URL DI BAWAH INI DENGAN URL WEB APP GOOGLE KAMU 
   * (Ambil dari Deployment Google Apps Script yang baru)
   */
  const URL_WEB_APP = "https://script.google.com/macros/s/AKfycbzdEl91ieEO2n4pjg8b7Z0DGv06OFELw8g6t-YhSN8tU9GvMg2PgZGVu0keO8SKaR7kDA/exec"; 

  let scanner;
  let processing = false;

  function onScanSuccess(decodedText) {
    if (processing) return;
    processing = true;

    const box = document.getElementById('statusBox');
    const text = document.getElementById('statusText');
    const icon = document.getElementById('statusIcon');

    // UI: Sedang Memproses
    text.innerText = "MENGIRIM DATA...";
    box.className = "status-area shadow-sm bg-waiting";
    icon.innerText = "⏳";

    /**
     * TEKNIK JSONP:
     * Digunakan agar GitHub bisa membaca respon data dari Google Apps Script
     * tanpa diblokir oleh kebijakan keamanan browser (CORS).
     */
    const callbackName = 'kirimDataAbsen'; 
    const script = document.createElement('script');

    // Fungsi Penangkap Jawaban dari Google
    window[callbackName] = function(res) {
      if(res.status === 'success') {
        icon.innerText = "✅";
        box.className = "status-area shadow-sm bg-success-custom animate__animated animate__pulse";
        text.innerHTML = `
          <div class="fs-5 fw-bold">${res.pesan}</div>
          <div class="small opacity-90 mt-1">Total Hadir: ${res.hadir} Hari</div>
        `;
      } else {
        icon.innerText = "❌";
        box.className = "status-area shadow-sm bg-error-custom";
        text.innerText = res.pesan;
      }
      
      // Bersihkan script setelah selesai
      delete window[callbackName];
      document.body.removeChild(script);
      
      // Reset scanner setelah 3 detik
      setTimeout(() => {
        icon.innerText = "📸";
        text.innerText = "SIAP PINDAI BERIKUTNYA...";
        box.className = "status-area shadow-sm bg-white";
        processing = false;
      }, 3000);
    };

    // Tembak URL dengan parameter ID dan Nama Callback
    script.src = `${URL_WEB_APP}?id=${encodeURIComponent(decodedText)}&callback=${callbackName}`;
    document.body.appendChild(script);
  }

  function initScanner() {
    // Pengaturan Kamera
    scanner = new Html5QrcodeScanner("reader", { 
      fps: 20, 
      qrbox: { width: 250, height: 250 },
      rememberLastUsedCamera: true,
      aspectRatio: 1.0
    });
    scanner.render(onScanSuccess);
  }

  // Jalankan saat halaman dibuka
  window.onload = initScanner;
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
