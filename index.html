<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --hijau: #15803d; }
    body { background-color: #f0fdf4; font-family: sans-serif; }
    .nav-pills .nav-link.active { background-color: var(--hijau); }
    #reader { border-radius: 15px; overflow: hidden; border: 3px solid var(--hijau) !important; }
    #result { min-height: 70px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite;}
    @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 40% { color: #333; text-shadow: .25em 0 0 rgba(0,0,0,0), .5em 0 0 rgba(0,0,0,0);} 60% { text-shadow: .25em 0 0 #333, .5em 0 0 rgba(0,0,0,0);} 80%, 100% { text-shadow: .25em 0 0 #333, .5em 0 0 #333;}}
  </style>
</head>
<body>

<div class="container py-3" style="max-width: 500px;">
  <div class="text-center mb-4 p-3 bg-white shadow-sm rounded-4">
    <h4 class="fw-bold text-success mb-0">🕌 ABSENSI MASJID</h4>
    <small class="text-muted">Tempelkan QR Code ke Kamera</small>
  </div>

  <ul class="nav nav-pills mb-3 justify-content-center bg-white p-2 rounded-pill shadow-sm">
    <li class="nav-item flex-fill"><button class="nav-link w-100 active" data-bs-toggle="pill" data-bs-target="#scan">Scanner</button></li>
    <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#dash">Siswa</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="scan">
      <div id="reader" class="shadow-sm"></div>
      <div id="result" class="mt-3 p-3 bg-white rounded-3 shadow-sm border text-center">Menunggu Scan...</div>
    </div>

    <div class="tab-pane fade" id="dash">
      <div class="card border-0 shadow-sm p-4 rounded-4">
        <div class="input-group mb-3">
          <input type="text" id="idIn" class="form-control" placeholder="ID Siswa...">
          <button class="btn btn-success" onclick="cari()">Cari</button>
        </div>
        <div id="resDash" style="display:none;" class="text-center">
          <h5 id="n" class="fw-bold"></h5>
          <div class="row mt-3">
            <div class="col-6 bg-light p-3 rounded-start border-end">Hadir: <h3 id="h" class="mb-0">0</h3></div>
            <div class="col-6 bg-light p-3 rounded-end">Progres: <h3 id="p" class="mb-0 text-success">0%</h3></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let html5QrcodeScanner;
  let isProcessing = false;

  function onScanSuccess(decodedText) {
    if (isProcessing) return; // Mencegah double trigger saat memproses
    isProcessing = true;

    const res = document.getElementById('result');
    res.innerHTML = '<span class="loading-dots">Memproses</span>';
    res.className = "mt-3 p-3 bg-warning-subtle text-warning-emphasis rounded-3 shadow-sm border text-center";

    google.script.run.withSuccessHandler(data => {
      res.innerText = data.pesan;
      res.className = data.status === 'success' ? "mt-3 p-3 bg-success text-white rounded-3 shadow-sm text-center" : "mt-3 p-3 bg-danger text-white rounded-3 shadow-sm text-center";
      
      // Reset scanner setelah 1.5 detik (lebih cepat dari sebelumnya)
      setTimeout(() => { 
        isProcessing = false;
        res.innerText = "Siap Scan Berikutnya...";
        res.className = "mt-3 p-3 bg-white text-muted rounded-3 shadow-sm border text-center";
      }, 1500);
    }).prosesAbsen(decodedText);
  }

  function start() {
    html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
      fps: 25, // Frame rate tinggi agar deteksi instan
      qrbox: {width: 250, height: 250},
      aspectRatio: 1.0
    });
    html5QrcodeScanner.render(onScanSuccess);
  }

  function cari() {
    google.script.run.withSuccessHandler(d => {
      if(d){
        document.getElementById('resDash').style.display = 'block';
        document.getElementById('n').innerText = d.nama;
        document.getElementById('h').innerText = d.hadir;
        document.getElementById('p').innerText = d.persen + "%";
      } else { alert("Data Kosong"); }
    }).getStatsSiswa(document.getElementById('idIn').value);
  }

  window.onload = start;
</script>
</body>
</html>
