<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Absensi Masjid SMK</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0fdf4; font-family: 'Segoe UI', sans-serif; }
    .header { background: #15803d; color: white; padding: 25px 0; border-radius: 0 0 30px 30px; }
    #reader { border-radius: 20px; overflow: hidden; border: 5px solid white !important; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-top: -20px; }
    .status-area { min-height: 80px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 15px; margin-top: 20px; text-align: center; }
    .bg-ready { background: white; color: #666; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="header text-center mb-4">
  <h4 class="fw-bold mb-0">🕌 PRESENSI DZUHUR</h4>
  <p class="small mb-0">Akses Cepat via GitHub Pages</p>
</div>

<div class="container" style="max-width: 480px;">
  <div id="reader"></div>
  <div id="statusBox" class="status-area bg-ready shadow-sm p-3">SIAP MEMINDAI...</div>
  
  <div class="mt-4 text-center">
    <small class="text-muted">Pastikan Izin Kamera Diaktifkan</small>
  </div>
</div>

<script>
  // --- KONFIGURASI: GANTI URL DI BAWAH INI ---
  const URL_WEB_APP = "MASUKKAN_URL_WEB_APP_GOOGLE_BAPAK_DI_SINI"; 

  let scanner;
  let processing = false;

  function onScanSuccess(decodedText) {
    if (processing) return;
    processing = true;

    const box = document.getElementById('statusBox');
    box.innerText = "MENGIRIM DATA...";
    box.className = "status-area bg-warning text-dark shadow-sm p-3";

    // Kirim data ke Google Sheets via Fetch API
    fetch(`${URL_WEB_APP}?id=${decodedText}`)
      .then(response => response.json())
      .then(res => {
        if(res.status === 'success') {
          box.innerHTML = `BERHASIL!<br>${res.pesan}`;
          box.className = "status-area bg-success text-white shadow-sm p-3";
        } else {
          box.innerText = "GAGAL: " + res.pesan;
          box.className = "status-area bg-danger text-white shadow-sm p-3";
        }
        setTimeout(() => {
          box.innerText = "SIAP PINDAI BERIKUTNYA...";
          box.className = "status-area bg-ready shadow-sm p-3";
          processing = false;
        }, 2500);
      })
      .catch(err => {
        box.innerText = "KONEKSI ERROR / URL SALAH";
        box.className = "status-area bg-dark text-white shadow-sm p-3";
        console.error(err);
        processing = false;
      });
  }

  function start() {
    scanner = new Html5QrcodeScanner("reader", { 
      fps: 20, 
      qrbox: 250,
      rememberLastUsedCamera: true
    });
    scanner.render(onScanSuccess);
  }

  window.onload = start;
</script>
</body>
</html>
