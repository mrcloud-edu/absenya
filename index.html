<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { background-color: #f0fdf4; font-family: sans-serif; }
    .header { background: #15803d; color: white; padding: 20px 0; border-radius: 0 0 25px 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #reader { border-radius: 20px; overflow: hidden; border: 4px solid white !important; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    .status-area { min-height: 90px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; margin-top: 20px; }
    .bg-ready { background: white; color: #666; border: 1px solid #ddd; }
    .bg-success-custom { background: #22c55e !important; color: white !important; }
    .nav-pills .nav-link.active { background-color: #15803d; }
  </style>
</head>
<body>

<div class="header text-center mb-4">
  <h4 class="fw-bold mb-0 text-uppercase">🕌 ABSENSI MASJID SMK</h4>
  <small>Scan QR Code untuk Absen Dzuhur</small>
</div>

<div class="container" style="max-width: 450px;">
  <ul class="nav nav-pills mb-3 justify-content-center p-1 bg-white rounded-pill shadow-sm">
    <li class="nav-item flex-fill"><button class="nav-link w-100 active" data-bs-toggle="pill" data-bs-target="#tab-scan">📸 SCANNER</button></li>
    <li class="nav-item flex-fill"><button class="nav-link w-100" data-bs-toggle="pill" data-bs-target="#tab-dash">📊 DATA SISWA</button></li>
  </ul>

  <div class="tab-content">
    <div class="tab-pane fade show active" id="tab-scan">
      <div id="reader"></div>
      <div id="statusBox" class="status-area bg-ready shadow-sm">SIAP PINDAI...</div>
    </div>

    <div class="tab-pane fade" id="tab-dash">
      <div class="card border-0 shadow-sm p-4 rounded-4 text-center">
        <input type="text" id="idInputan" class="form-control mb-3" placeholder="Masukkan ID Siswa...">
        <button class="btn btn-success w-100 mb-3" onclick="cekDashboard()">Cek Progres</button>
        <div id="hasilDash" style="display:none;" class="p-3 border rounded-3">
           <h5 id="namaS" class="fw-bold"></h5>
           <h1 id="hadirS" class="display-3 fw-bold text-success">0</h1>
           <p class="text-muted">Total Kehadiran</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let scanner;
  let processing = false;

  function onScanSuccess(decodedText) {
    if (processing) return;
    processing = true;

    const box = document.getElementById('statusBox');
    box.innerText = "MEMPROSES...";
    box.className = "status-area bg-warning text-dark shadow-sm";

    google.script.run.withSuccessHandler(res => {
      if(res.status === 'success') {
        box.innerText = res.pesan;
        box.className = "status-area bg-success-custom shadow-sm";
      } else {
        box.innerText = res.pesan;
        box.className = "status-area bg-danger text-white shadow-sm";
      }
      setTimeout(() => {
        box.innerText = "SIAP PINDAI...";
        box.className = "status-area bg-ready shadow-sm";
        processing = false;
      }, 2000);
    }).prosesAbsen(decodedText);
  }

  function cekDashboard() {
    const id = document.getElementById('idInputan').value;
    google.script.run.withSuccessHandler(d => {
      if(d){
        document.getElementById('hasilDash').style.display = 'block';
        document.getElementById('namaS').innerText = d.nama;
        document.getElementById('hadirS').innerText = d.hadir;
      } else { alert("Data tidak ditemukan"); }
    }).getStatsSiswa(id);
  }

  window.onload = function() {
    scanner = new Html5QrcodeScanner("reader", { fps: 20, qrbox: 250 });
    scanner.render(onScanSuccess);
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
